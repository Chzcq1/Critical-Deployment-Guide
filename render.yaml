services:
  - type: web
    name: digital-product-store
    runtime: python
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install &&
      BASE_PATH=/ pnpm --filter @workspace/store run build
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_GROUP_ID
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: VITE_BOT_USERNAME
        sync: false
