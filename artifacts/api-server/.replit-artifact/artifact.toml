kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/webhook"]

[services.development]
run = "cd /home/runner/workspace && PORT=8080 uvicorn backend.main:app --host 0.0.0.0 --port 8080 --reload"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
